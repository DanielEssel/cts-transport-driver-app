name: cts_transport_driver_app
description: "CTS Driver App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cloud_functions: ^5.0.1
  
  shared:
    path: ../shared

  equatable: ^2.0.7
  dartz: ^0.10.1
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.6.1

  firebase_app_check: ^0.3.1+3


  # ── UI & Fonts ──────────────────────────────────
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  lottie: ^3.1.0

  # ── State Management ────────────────────────────
  provider: ^6.1.2

  # ── Firebase ────────────────────────────────────
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_database: ^11.1.4        # Realtime DB – driver presence & location
  firebase_storage: ^12.3.2         # Profile photo uploads
  firebase_messaging: ^15.1.3       # Push notifications for ride requests
  flutter_local_notifications: ^17.2.3  # Show FCM alerts in foreground

  # ── Maps & Location ─────────────────────────────
  geolocator: ^13.0.1
  google_maps_flutter: ^2.9.0
  flutter_polyline_points: ^2.1.0   # Draw route lines on the map

  # ── Networking ──────────────────────────────────
  dio: ^5.7.0
  connectivity_plus: ^6.0.5         # Detect online/offline state

  # ── Storage & Preferences ───────────────────────
  shared_preferences: ^2.3.2

  # ── Utilities ───────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.5.1                      # Generate unique IDs client-side
  permission_handler: ^11.3.1       # Runtime permissions (location, camera)
  image_picker: ^1.1.2              # Pick/capture profile photos
  url_launcher: ^6.3.1              # Open phone dialler, maps, etc.
  package_info_plus: ^8.1.0         # App version in Settings screen
  go_router: ^17.2.3
  fpdart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.6.5 # Required to turn annotations into code
  build_runner: ^2.5.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/logos/

  # fonts:
  #   # Uncomment if you want a custom font bundle instead of google_fonts network fetch
  #   # - family: AppFont
  #   #   fonts:
  #   #     - asset: assets/fonts/AppFont-Regular.ttf
  #   #     - asset: assets/fonts/AppFont-Bold.ttf
  #   #       weight: 700